<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Bestellung | BMK Festival{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bestellung-primary: #6366f1;
            --bestellung-primary-dark: #4f46e5;
            --bestellung-secondary: #8b5cf6;
            --bestellung-accent: #ec4899;
            --bestellung-success: #10b981;
            --bestellung-warning: #f59e0b;
            --bestellung-danger: #ef4444;
            --bestellung-light: #f8fafc;
            --bestellung-dark: #1e293b;
            --bestellung-white: #ffffff;
            --bestellung-gray-100: #f1f5f9;
            --bestellung-gray-200: #e2e8f0;
            --bestellung-gray-300: #cbd5e1;
            --bestellung-gray-600: #475569;
            --bestellung-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --bestellung-shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, var(--bestellung-light) 0%, #e0e7ff 100%);
            color: var(--bestellung-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        .bestellung-navbar {
            background: linear-gradient(135deg, var(--bestellung-primary) 0%, var(--bestellung-secondary) 100%);
            box-shadow: var(--bestellung-shadow-lg);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .bestellung-navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: white !important;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .bestellung-navbar-brand i {
            font-size: 2rem;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.85) !important;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            color: white !important;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.8);
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Main container */
        .bestellung-main {
            flex: 1;
            padding: 2rem 0;
        }

        .bestellung-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Page header */
        .bestellung-page-header {
            margin-bottom: 3rem;
            animation: slideDown 0.5s ease;
        }

        .bestellung-page-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--bestellung-dark);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .bestellung-page-subtitle {
            font-size: 1.1rem;
            color: var(--bestellung-gray-600);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cards */
        .bestellung-card {
            border: none;
            border-radius: 0.75rem;
            box-shadow: var(--bestellung-shadow);
            transition: all 0.3s ease;
            background: var(--bestellung-white);
            overflow: hidden;
        }

        .bestellung-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--bestellung-shadow-lg);
        }

        .bestellung-card-header {
            background: linear-gradient(135deg, var(--bestellung-primary) 0%, var(--bestellung-primary-dark) 100%);
            color: white;
            padding: 1.5rem;
            font-weight: 600;
            border: none;
        }

        .bestellung-card-header.secondary {
            background: linear-gradient(135deg, var(--bestellung-secondary) 0%, #a78bfa 100%);
        }

        .bestellung-card-header.success {
            background: linear-gradient(135deg, var(--bestellung-success) 0%, #059669 100%);
        }

        .bestellung-card-header.warning {
            background: linear-gradient(135deg, var(--bestellung-warning) 0%, #d97706 100%);
        }

        .bestellung-card-body {
            padding: 2rem;
        }

        /* Forms */
        .form-label {
            font-weight: 600;
            color: var(--bestellung-dark);
            margin-bottom: 0.5rem;
        }

        .form-control,
        .form-select {
            border: 2px solid var(--bestellung-gray-200);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--bestellung-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-control::placeholder {
            color: var(--bestellung-gray-300);
        }

        /* Buttons */
        .btn {
            border-radius: 0.5rem;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--bestellung-primary) 0%, var(--bestellung-primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
            color: white;
        }

        .btn-outline-secondary {
            color: var(--bestellung-gray-600);
            border: 2px solid var(--bestellung-gray-200);
        }

        .btn-outline-secondary:hover {
            background: var(--bestellung-gray-100);
            border-color: var(--bestellung-gray-300);
            color: var(--bestellung-dark);
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .btn-lg {
            padding: 1rem 2rem;
            font-size: 1.1rem;
        }

        /* Alerts */
        .alert {
            border-radius: 0.75rem;
            border: none;
            padding: 1.5rem;
        }

        .alert-info {
            background: linear-gradient(135deg, #e0f2fe 0%, #cffafe 100%);
            color: #0c4a6e;
        }

        .alert-success {
            background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
            color: #15803d;
        }

        .alert-warning {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #92400e;
        }

        .alert-danger {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #7f1d1d;
        }

        /* Tables */
        .table {
            margin-bottom: 0;
        }

        .table-hover tbody tr {
            transition: all 0.3s ease;
        }

        .table-hover tbody tr:hover {
            background-color: var(--bestellung-light);
            transform: scale(1.01);
        }

        .table thead {
            background: var(--bestellung-gray-100);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* Badges */
        .badge {
            padding: 0.5rem 0.75rem;
            font-weight: 600;
            border-radius: 0.375rem;
            font-size: 0.85rem;
        }

        /* Footer */
        .bestellung-footer {
            background: var(--bestellung-dark);
            color: white;
            padding: 3rem 0 1.5rem;
            margin-top: auto;
            text-align: center;
        }

        .bestellung-footer p {
            margin: 0.5rem 0;
            opacity: 0.9;
        }

        .bestellung-footer a {
            color: var(--bestellung-primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .bestellung-footer a:hover {
            color: var(--bestellung-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .bestellung-page-title {
                font-size: 1.75rem;
            }

            .bestellung-card-body {
                padding: 1.5rem;
            }

            .bestellung-main {
                padding: 1rem 0;
            }

            .btn-lg {
                width: 100%;
            }

            .table-responsive {
                font-size: 0.9rem;
            }
        }

        /* Utilities */
        .gap-2 {
            gap: 0.5rem !important;
        }

        .gap-3 {
            gap: 1rem !important;
        }

        .gap-4 {
            gap: 1.5rem !important;
        }

        .text-muted {
            color: var(--bestellung-gray-600) !important;
        }

        .text-center {
            text-align: center;
        }

        .w-100 {
            width: 100%;
        }

        /* Loading animation */
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bestellung-light);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bestellung-primary);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--bestellung-primary-dark);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="bestellung-navbar">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-auto">
                    <a class="bestellung-navbar-brand" href="/">
                        <i class="bi bi-cart-fill"></i>
                        <span>BMK Bestellung</span>
                    </a>
                </div>
                <div class="col-auto ms-auto">
                    <nav class="nav">
                        <a class="nav-link" href="/">
                            <i class="bi bi-house-fill"></i> Startseite
                        </a>
                        {% if user.is_staff %}
                            <a class="nav-link" href="{% url 'bestellung:admin_template_list' %}">
                                <i class="bi bi-gear"></i> Admin
                            </a>
                        {% endif %}
                    </nav>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="bestellung-main">
        <div class="bestellung-container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bestellung-footer">
        <div class="bestellung-container">
            <p>
                <strong>Bergmannskapelle Buggingen e.V.</strong>
            </p>
            <p>
                Telefon: <a href="tel:015226160032">01522 6160032</a> |
                E-Mail: <a href="mailto:kontakt@bmk-buggingen.de">kontakt@bmk-buggingen.de</a>
            </p>
            <p style="margin-top: 1rem; opacity: 0.7; font-size: 0.9rem;">
                Mit kräftigem "Glück Auf!"
            </p>
        </div>
    </footer>

    <!-- Bootstrap Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
