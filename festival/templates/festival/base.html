<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Helferpläne BMK{% endblock title %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --festival-primary: #6366f1;
            --festival-secondary: #8b5cf6;
            --festival-success: #10b981;
            --festival-accent: #f59e0b;
            --festival-dark: #1f2937;
            --festival-light: #f9fafb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--festival-light) 0%, #f3f4f6 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            color: var(--festival-dark);
        }

        /* Festival Navigation */
        .festival-navbar {
            background: linear-gradient(135deg, var(--festival-primary) 0%, var(--festival-secondary) 100%);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .festival-navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: white !important;
            letter-spacing: -0.5px;
        }

        .festival-navbar .nav-link {
            color: rgba(255, 255, 255, 0.9) !important;
            font-weight: 500;
            transition: color 0.3s ease;
            margin-left: 0.5rem;
        }

        .festival-navbar .nav-link:hover {
            color: white !important;
        }

        .festival-navbar .nav-link.active {
            color: var(--festival-accent) !important;
            border-bottom: 2px solid var(--festival-accent);
            padding-bottom: 0.5rem;
        }

        /* Main Container */
        .festival-main {
            padding: 2rem 1rem;
        }

        .festival-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.6s ease;
        }

        .festival-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--festival-dark);
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--festival-primary) 0%, var(--festival-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .festival-date {
            font-size: 1.1rem;
            color: #6b7280;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .festival-date i {
            color: var(--festival-primary);
            font-size: 1.3rem;
        }

        .festival-description {
            font-size: 1rem;
            color: #6b7280;
            max-width: 600px;
            margin: 1rem auto;
            line-height: 1.6;
        }

        /* Shift Section */
        .shift-section {
            margin-bottom: 3rem;
            animation: fadeInUp 0.6s ease 0.1s backwards;
        }

        .shift-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--festival-primary);
        }

        .shift-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--festival-primary) 0%, var(--festival-secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .shift-header h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--festival-dark);
            margin: 0;
        }

        .shift-info {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .shift-info-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            color: #6b7280;
        }

        .shift-info-item i {
            color: var(--festival-primary);
            font-size: 1.1rem;
        }

        /* Tasks Grid */
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .tasks-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .festival-header h1 {
                font-size: 1.8rem;
            }

            .shift-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .shift-header h2 {
                font-size: 1.4rem;
            }

            .shift-info {
                gap: 1rem;
            }
        }

        /* Task Card */
        .task-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.6s ease;
        }

        .task-card:hover:not(.task-full) {
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.2);
            transform: translateY(-4px);
        }

        .task-card-header {
            padding: 1rem 1rem 0.75rem;
            border-bottom: 3px solid var(--festival-primary);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.05) 0%, rgba(139, 92, 246, 0.05) 100%);
        }

        .task-card-header h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--festival-dark);
            margin: 0 0 0.5rem 0;
        }

        .task-card-header p {
            margin: 0;
            color: #6b7280;
            font-size: 0.9rem;
        }

        .task-card-body {
            padding: 1rem;
            flex-grow: 1;
        }

        .task-description {
            color: #6b7280;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .task-requirements {
            background: #fef3c7;
            border-left: 4px solid var(--festival-accent);
            padding: 0.75rem 1rem;
            margin-bottom: 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #92400e;
        }

        .task-capacity {
            margin-top: 0.75rem;
        }

        .capacity-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--festival-dark);
        }

        .capacity-label .current {
            font-weight: 700;
            color: var(--festival-primary);
        }

        .capacity-label .total {
            color: #9ca3af;
        }

        .progress {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--festival-primary) 0%, var(--festival-secondary) 100%);
            transition: width 0.3s ease;
        }

        .task-card-footer {
            padding: 0.75rem 1rem 1rem;
            border-top: 1px solid #e5e7eb;
        }

        /* Buttons */
        .signup-btn {
            width: 100%;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        .signup-btn.available {
            background: linear-gradient(135deg, var(--festival-primary) 0%, var(--festival-secondary) 100%);
            color: white;
        }

        .signup-btn.available:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        .signup-btn.full {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .task-card.task-full {
            opacity: 0.7;
        }

        .task-card.task-full .task-card-header {
            background: #f3f4f6;
            border-bottom-color: #d1d5db;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #9ca3af;
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--festival-primary);
            opacity: 0.2;
            display: block;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            color: var(--festival-dark);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #9ca3af;
        }

        /* Admin Badge */
        .admin-badge {
            display: inline-block;
            background: var(--festival-success);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .festival-main {
                padding: 1rem 0.5rem;
            }

            .festival-header h1 {
                font-size: 1.5rem;
            }

            .shift-header h2 {
                font-size: 1.2rem;
            }

            .shift-info {
                gap: 1rem;
                flex-direction: column;
            }

            .shift-icon {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <!-- Festival Navigation Bar -->
    <nav class="festival-navbar navbar navbar-expand-lg">
        <div class="container-lg">
            <span class="navbar-brand festival-navbar-brand">
                <i class="bi bi-music-note-beamed"></i> Helferpläne BMK
            </span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% if user.is_staff %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'festival:admin_festival_list' %}">
                                <i class="bi bi-speedometer2"></i> Admin
                            </a>
                        </li>
                    {% endif %}
                    {% if festival %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'festival:festival_detail' festival.slug %}">
                                <i class="bi bi-house"></i> Festival
                            </a>
                        </li>
                        {% if user.is_staff %}
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'festival:admin_overview' festival.slug %}">
                                    <i class="bi bi-chart-bar"></i> Übersicht <span class="admin-badge">ADMIN</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'festival:participant_list_admin' festival.slug %}">
                                    <i class="bi bi-people"></i> Teilnehmer
                                </a>
                            </li>
                        {% endif %}
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="festival-main">
        <div class="container-lg">
            {% block page_content %}{% endblock page_content %}
        </div>
    </main>

    <footer class="text-center py-3 mt-4" style="font-size: 0.85rem; color: #6b7280; border-top: 1px solid #e5e7eb;">
        <a href="https://bmk-buggingen.de/datenschutzerklaerung-2/" target="_blank" rel="noopener noreferrer">Datenschutzerklärung</a>
        &nbsp;&bull;&nbsp;
        <a href="https://bmk-buggingen.de/impressum-2/" target="_blank" rel="noopener noreferrer">Impressum</a>
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
